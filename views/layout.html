<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= typeof title !== 'undefined' ? title + ' - ' : '' %>Barangay Tibay</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">Barangay Tibay</a>
            <div class="nav-links">
                <% if (typeof user !== 'undefined' && user) { %>
                    <% if (user.role === 'admin') { %>
                        <a href="/admin">Dashboard</a>
                        <a href="/admin/reports">Reports</a>
                        <a href="/admin/users">Residents</a>
                        <a href="/admin/fetch-report">Fetch Template</a>
                    <% } else { %>
                        <a href="/dashboard">My Reports</a>
                        <a href="/reports/new">Submit Report</a>
                        <a href="/profile">Profile</a>
                    <% } %>
                    <a href="/logout">Logout</a>
                <% } else { %>
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                <% } %>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <%- body %>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Barangay Tibay. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
